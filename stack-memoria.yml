version: "3.9"

name: memoria-video

networks:
  traefik-public:
    external: true
  memoria-internal:
    driver: overlay

volumes:
  mongodb-data:
  postgresql-data:

services:
  mongodb:
    image: mongo:7
    networks: [memoria-internal]
    volumes: [mongodb-data:/data/db]
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      placement: [constraints: [node.role == manager]]
      resources: {limits: {memory: 2G}, reservations: {memory: 512M}}

  redis:
    image: redis:7-alpine
    networks: [memoria-internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      resources: {limits: {memory: 256M}, reservations: {memory: 64M}}

  postgres:
    image: postgres:16-alpine
    networks: [memoria-internal]
    volumes: [postgresql-data:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: memoria_video
      POSTGRES_USER: memoria
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets: [pg_password]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoria -d memoria_video"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      placement: [constraints: [node.role == manager]]

  backend:
    image: pelagus/memoria-video:latest
    build:
      context: https://github.com/prometheapelagus-cloud/memoria-video.git
      dockerfile: backend/Dockerfile
    networks: [memoria-internal, traefik-public]
    depends_on: [mongodb, redis, postgres]
    environment:
      DATABASE_URL: postgresql+asyncpg://memoria:$${POSTGRES_PASSWORD}@postgres:5432/memoria_video
      MONGODB_URL: mongodb://mongodb:27017/memoria_video
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
    secrets: [pg_password]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      replicas: 2
      update_config: {parallelism: 1, delay: 10s, order: start-first}
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.memoria.rule=Host(`memoria.pelagus.com.br`)"
        - "traefik.http.routers.memoria.entrypoints=websecure"
        - "traefik.http.routers.memoria.tls=true"
        - "traefik.http.routers.memoria.tls.certresolver=letsencrypt"
        - "traefik.http.services.memoria.loadbalancer.server.port=8000"
      resources: {limits: {memory: 1G}, reservations: {memory: 256M}}

  frontend:
    image: nginx:alpine
    networks: [memoria-internal, traefik-public]
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.memoria-front.rule=Host(`admin.memoria.pelagus.com.br`)"
        - "traefik.http.routers.memoria-front.entrypoints=websecure"
        - "traefik.http.routers.memoria-front.tls=true"
        - "traefik.http.routers.memoria-front.tls.certresolver=letsencrypt"
        - "traefik.http.services.memoria-front.loadbalancer.server.port=80"

secrets:
  pg_password:
    external: true
    name: memoria_pg_password
