<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memórias em Vídeo — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div class="login-page">
      <div class="login-card" id="page-content">
        <div class="login-card__logo">
          <h1>🎬 Memórias em Vídeo</h1>
          <p>Painel administrativo</p>
        </div>
        <div id="login-alert"></div>
        <form id="login-form" autocomplete="on" novalidate>
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" class="form-input" placeholder="seu@email.com" required autocomplete="email" inputmode="email">
            <div class="form-error hidden" id="email-error">Informe um e-mail válido</div>
          </div>
          <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" class="form-input" placeholder="Sua senha" required autocomplete="current-password" minlength="4">
            <div class="form-error hidden" id="password-error">A senha é obrigatória</div>
          </div>
          <button type="submit" id="login-btn" class="btn btn-primary btn-block btn-lg">Entrar</button>
        </form>
        <p class="login-card__footer">Ambiente seguro · TLS 1.3</p>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/sse.js"></script>
  <script src="js/app.js"></script>
  <script>
    function initLoginForm() {
      const form = document.getElementById('login-form');
      const btn = document.getElementById('login-btn');
      const alertEl = document.getElementById('login-alert');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        alertEl.innerHTML = '';
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        document.getElementById('email-error').classList.add('hidden');
        document.getElementById('password-error').classList.add('hidden');
        let valid = true;
        if (!email || !email.includes('@')) { document.getElementById('email-error').classList.remove('hidden'); valid = false; }
        if (!password || password.length < 4) { document.getElementById('password-error').classList.remove('hidden'); valid = false; }
        if (!valid) return;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-btn"></span> Entrando…';
        try {
          await auth.login(email, password);
          window.location.hash = '#/dashboard';
        } catch (err) {
          alertEl.innerHTML = `<div class="alert alert--error">${escapeHtml(err.message)}</div>`;
          btn.disabled = false;
          btn.innerHTML = 'Entrar';
        }
      });
    }
  </script>
</body>
</html>
