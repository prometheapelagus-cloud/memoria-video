<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memórias em Vídeo — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script src="js/api.js"></script>
  <script src="js/sse.js"></script>
  <script src="js/app.js"></script>
  <script>
    function getDashboardHTML() {
      return `<div class="metrics-grid" id="metrics-grid">
          <div class="metric-card"><div class="metric-card__icon metric-card__icon--blue">📦</div><div class="metric-card__label">Pedidos Hoje</div><div class="metric-card__value" id="metric-hoje"><div class="skeleton skeleton--text-lg" style="width:60px"></div></div></div>
          <div class="metric-card"><div class="metric-card__icon metric-card__icon--green">📊</div><div class="metric-card__label">Este Mês</div><div class="metric-card__value" id="metric-mes"><div class="skeleton skeleton--text-lg" style="width:60px"></div></div></div>
          <div class="metric-card"><div class="metric-card__icon metric-card__icon--yellow">✅</div><div class="metric-card__label">Taxa de Aprovação</div><div class="metric-card__value" id="metric-taxa"><div class="skeleton skeleton--text-lg" style="width:80px"></div></div></div>
          <div class="metric-card"><div class="metric-card__icon metric-card__icon--red">⏱️</div><div class="metric-card__label">Tempo Médio</div><div class="metric-card__value" id="metric-tempo"><div class="skeleton skeleton--text-lg" style="width:80px"></div></div></div>
        </div>
        <div class="cols-2">
          <div class="card"><div class="card__header"><h3>📈 Pedidos por Tipo de Evento</h3></div><div class="card__body"><div class="chart-container"><canvas id="chart-eventos"></canvas></div></div></div>
          <div class="card"><div class="card__header"><h3>📋 Últimos Pedidos</h3><a href="#/pedidos" class="btn btn-sm btn-secondary">Ver todos</a></div><div class="card__body" style="padding:0;"><div class="table-wrapper"><table><thead><tr><th>Cliente</th><th>Evento</th><th>Status</th><th>Data</th></tr></thead><tbody id="ultimos-pedidos-tbody"><tr class="skeleton-row"><td><div class="skeleton skeleton--text" style="width:60%"></div></td><td><div class="skeleton skeleton--text" style="width:50%"></div></td><td><div class="skeleton skeleton--text-sm" style="width:40%"></div></td><td><div class="skeleton skeleton--text-sm" style="width:30%"></div></td></tr></tbody></table></div></div></div>
        </div>`;
    }
    async function loadDashboard() {
      setPageMeta('Dashboard', 'Visão geral dos pedidos');
      try {
        const [metrics, pedidos] = await Promise.all([
          api.get('/dashboard/metrics').catch(() => null),
          api.get('/pedidos', { params: { limit: 5 } }).catch(() => null),
        ]);
        if (metrics) {
          document.getElementById('metric-hoje').innerHTML = metrics.hoje ?? '0';
          document.getElementById('metric-mes').innerHTML = metrics.mes ?? '0';
          document.getElementById('metric-taxa').innerHTML = metrics.taxa_aprovacao != null ? metrics.taxa_aprovacao + '%' : '—';
          document.getElementById('metric-tempo').innerHTML = metrics.tempo_medio ?? '—';
        }
        if (pedidos) renderUltimosPedidos(Array.isArray(pedidos) ? pedidos : (pedidos.items || pedidos.data || []));
        else renderUltimosPedidos([]);
        try { const d = await api.get('/dashboard/eventos'); renderPieChart(d); } catch { renderPieChart(null); }
      } catch (err) { console.error(err); }
    }
    function renderUltimosPedidos(pedidos) {
      const tbody = document.getElementById('ultimos-pedidos-tbody');
      if (!pedidos || pedidos.length === 0) { tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state" style="padding:var(--space-8)"><div class="empty-state__icon">📭</div><div class="empty-state__text">Nenhum pedido recente</div></div></td></tr>'; return; }
      tbody.innerHTML = pedidos.map(p => `<tr onclick="window.location.href='#/pedido/${p.id}'" style="cursor:pointer;"><td><strong>${esc(p.cliente_nome || p.nome || '—')}</strong></td><td>${esc(p.evento_nome || p.tipo_evento || '—')}</td><td><span class="badge badge--${statusBadgeClass(p.status)}">${statusLabelMap(p.status)}</span></td><td>${p.created_at ? new Date(p.created_at).toLocaleDateString('pt-BR') : '—'}</td></tr>`).join('');
    }
    let chartInstance = null;
    function renderPieChart(data) {
      const canvas = document.getElementById('chart-eventos');
      if (!canvas) return;
      if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
      const labels = data && data.length ? data.map(d => d.nome || d.tipo || 'Outros') : ['Aniversário', 'Casamento', 'Formatura', 'Outros'];
      const values = data && data.length ? data.map(d => d.total || d.quantidade || d.count || 1) : [10, 7, 5, 3];
      const colors = ['oklch(45% 0.15 265)','oklch(50% 0.18 145)','oklch(60% 0.16 85)','oklch(50% 0 0)'];
      const ctx = canvas.getContext('2d');
      chartInstance = new Chart(ctx, { type: 'pie', data: { labels, datasets: [{ data: values, backgroundColor: colors.slice(0, labels.length), borderWidth: 2, borderColor: 'oklch(100% 0 0)' }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true, font: { family: '-apple-system, BlinkMacSystemFont, Segoe UI, system-ui, sans-serif' } } } } } });
    }
    function statusBadgeClass(s) { return ({'pendente':'warning','aprovado':'success','processando':'info','concluido':'success','concluído':'success','cancelado':'danger','rejeitado':'danger','erro':'danger'})[s?.toLowerCase()] || 'neutral'; }
    function statusLabelMap(s) { return ({'pendente':'Pendente','aprovado':'Aprovado','processando':'Processando','concluido':'Concluído','concluído':'Concluído','cancelado':'Cancelado','rejeitado':'Rejeitado','erro':'Erro'})[s?.toLowerCase()] || s || '—'; }
    function esc(str) { if (!str) return '—'; const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
  </script>
</body>
</html>
